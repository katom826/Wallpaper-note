<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone 14 Wallpaper Memo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <main class="input-container">
            <div 
                id="memo-input" 
                contenteditable="true" 
                data-placeholder="ここにメモを入力..."
            ></div>
        </main>

        <footer class="controls">
            <button id="download-btn" class="primary-btn">
                <span class="btn-icon">💾</span>
                壁紙を保存する
            </button>
        </footer>
    </div>

    <!-- 画像生成用の隠しキャンバス -->
    <canvas id="export-canvas" width="1170" height="2532" style="display: none;"></canvas>

    <script src="script.js"></script>
</body>
</html>
